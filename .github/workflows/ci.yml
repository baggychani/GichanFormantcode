# push/PR: 빠른 검증만 (테스트 + 버전). 바이너리 빌드는 release.yml (태그) 전용.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# 같은 브랜치에 연속 push 시 이전 실행 취소 → 실행 횟수·메일 감소
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --locked --all-extras --dev

      - name: Version files match config.APP_VERSION
        run: uv run python scripts/sync_version.py --check

      - name: Install Qt runtime (PySide6 on headless Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest tests/ -q
