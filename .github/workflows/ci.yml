name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test & version check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --locked --all-extras --dev

      - name: Version files match config.APP_VERSION
        run: uv run python scripts/sync_version.py --check

      - name: Pytest
        run: uv run pytest tests/ -q

  build:
    name: Build (${{ matrix.label }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            artifact_name: GichanFormant-windows-x64
          - os: macos-15-intel
            label: macos-intel
            artifact_name: GichanFormant-macos-intel
          - os: macos-latest
            label: macos-arm64
            artifact_name: GichanFormant-macos-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - uses: astral-sh/setup-uv@v7

      - run: uv sync --locked --all-extras --dev

      - name: Sync iss / info.txt from config
        run: uv run python scripts/sync_version.py

      - name: Set Short SHA
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build (Windows onedir)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          uv run pyinstaller --noconfirm --windowed `
            --icon=assets/icon.ico `
            --name=GichanFormant `
            --version-file=info.txt `
            --collect-all PySide6 `
            --add-data "assets;assets" `
            main.py
          Compress-Archive -Path "dist\GichanFormant\*" `
            -DestinationPath "${{ matrix.artifact_name }}-${env:SHORT_SHA}.zip" -Force

      - name: Build (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          uv run pyinstaller --noconfirm --windowed \
            --name=GichanFormant \
            --version-file=info.txt \
            --collect-all PySide6 \
            --add-data "assets:assets" \
            main.py
          cd dist
          ditto -c -k --sequesterRsrc --keepParent GichanFormant.app \
            "../${{ matrix.artifact_name }}-${SHORT_SHA}.zip"
          cd ..

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}
          path: ${{ matrix.artifact_name }}-*
